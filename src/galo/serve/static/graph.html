<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GALO — Knowledge Graph</title>
<style>
  :root {
    --bg: #e0e5ec; --shadow-d: #a3b1c6; --shadow-l: #ffffff;
    --text: #46505f; --muted: #8795a8; --accent: #6d8dc7;
    --ok: #57cc99; --bad: #e07a5f; --r: 14px;
  }
  [data-theme="dark"] {
    --bg: #2b2f36; --shadow-d: #212429; --shadow-l: #353a42;
    --text: #c7cdd6; --muted: #828d9e; --accent: #8aa6da;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font: 14px/1.5 system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
         background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
         display: flex; flex-direction: column; transition: background .3s, color .3s; }
  .raised { box-shadow: 5px 5px 11px var(--shadow-d), -5px -5px 11px var(--shadow-l); }
  .inset  { box-shadow: inset 4px 4px 9px var(--shadow-d), inset -4px -4px 9px var(--shadow-l); }

  header { display: flex; align-items: center; gap: 14px; padding: 14px 22px; margin: 14px;
           border-radius: var(--r); background: var(--bg);
           box-shadow: 5px 5px 11px var(--shadow-d), -5px -5px 11px var(--shadow-l); flex: none; }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: 1px; color: var(--accent); }
  .sub { font-size: 11px; color: var(--muted); }
  a.back { font-size: 12px; color: var(--accent); text-decoration: none; padding: 7px 14px;
           border-radius: 10px; box-shadow: 4px 4px 8px var(--shadow-d), -4px -4px 8px var(--shadow-l); }
  a.back:active { box-shadow: inset 3px 3px 6px var(--shadow-d), inset -3px -3px 6px var(--shadow-l); }
  .controls { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  input, button { border: 0; outline: 0; font: inherit; color: var(--text); background: var(--bg); }
  input[type=text] { border-radius: 10px; padding: 9px 13px; width: 180px;
                     box-shadow: inset 3px 3px 7px var(--shadow-d), inset -3px -3px 7px var(--shadow-l); }
  input[type=number] { border-radius: 10px; padding: 9px 11px; width: 78px;
                       box-shadow: inset 3px 3px 7px var(--shadow-d), inset -3px -3px 7px var(--shadow-l); }
  button { cursor: pointer; font-weight: 600; border-radius: 10px; padding: 9px 16px; color: var(--text);
           box-shadow: 4px 4px 8px var(--shadow-d), -4px -4px 8px var(--shadow-l); transition: .14s; }
  button:hover { color: var(--accent); }
  button:active, button:disabled { box-shadow: inset 3px 3px 7px var(--shadow-d), inset -3px -3px 7px var(--shadow-l); }
  label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .theme { width: 34px; height: 34px; border-radius: 50%; padding: 0; }

  .stage { flex: 1; margin: 0 14px 14px; border-radius: 16px; position: relative; overflow: hidden; }
  canvas { width: 100%; height: 100%; display: block; cursor: grab; }
  .meta { position: absolute; top: 14px; left: 18px; font-size: 12px; color: var(--muted);
          background: var(--bg); padding: 6px 12px; border-radius: 10px;
          box-shadow: 3px 3px 7px var(--shadow-d), -3px -3px 7px var(--shadow-l); }
  .legend { position: absolute; bottom: 14px; left: 18px; display: flex; gap: 14px; flex-wrap: wrap;
            font-size: 11px; color: var(--muted); background: var(--bg); padding: 8px 14px; border-radius: 10px;
            box-shadow: 3px 3px 7px var(--shadow-d), -3px -3px 7px var(--shadow-l); }
  .legend i { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .legend span { cursor: pointer; user-select: none; opacity: 1; transition: opacity .15s; }
  .legend span.off { opacity: .3; }
</style>
</head>
<body>
<header>
  <span class="logo">GALO</span><span class="sub">Knowledge Graph</span>
  <a class="back" href="/">← Dashboard</a>
  <div class="controls">
    <input type="text" id="search" placeholder="Find entity…" oninput="onSearch()">
    <span><label>max nodes</label></span>
    <input type="number" id="limit" value="120" min="10" max="500" step="10">
    <button onclick="load()">↻ Reload</button>
    <button class="theme" id="themeBtn" title="Toggle theme">🌙</button>
  </div>
</header>

<div class="stage inset">
  <canvas id="graph"></canvas>
  <div class="meta" id="meta">loading…</div>
  <div class="legend" id="legend"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const TYPE_COLORS = { PERSON:"#f778ba", ORG:"#6d8dc7", CONCEPT:"#57cc99", PLACE:"#e9c46a", OTHER:"#9aa5b1" };
const nodeR = (n) => 5 + Math.min(n.degree, 11);

const cv = $("graph"), ctx = cv.getContext("2d");
let G = { nodes: [], edges: [] }, drag = null, hover = null, raf = null;
let hiddenTypes = new Set(), match = "";

function size() { const p = window.devicePixelRatio||1; cv.width = cv.clientWidth*p; cv.height = cv.clientHeight*p; ctx.setTransform(p,0,0,p,0,0); }

async function load() {
  $("meta").textContent = "loading…";
  try {
    const lim = Math.max(10, Math.min(500, +$("limit").value || 120));
    const r = await fetch("/graph?limit=" + lim);
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || "HTTP " + r.status);
    size();
    const W = cv.clientWidth, H = cv.clientHeight;
    G.nodes = data.nodes.map((n,i) => ({ ...n, x: W/2+Math.cos(i*2.4)*Math.min(W,H)*0.35, y: H/2+Math.sin(i*2.4)*Math.min(W,H)*0.32, vx:0, vy:0 }));
    const by = Object.fromEntries(G.nodes.map(n => [n.id, n]));
    G.edges = data.edges.map(e => ({ ...e, s: by[e.source], t: by[e.target] })).filter(e => e.s && e.t);
    $("meta").textContent = `${G.nodes.length} nodes · ${G.edges.length} edges`;
    drawLegend();
    if (raf) cancelAnimationFrame(raf); tick(360);
  } catch (e) { $("meta").textContent = "error: " + e.message; ctx.clearRect(0,0,cv.width,cv.height); }
}

function drawLegend() {
  const types = [...new Set(G.nodes.map(n => n.type))];
  $("legend").innerHTML = types.map(t =>
    `<span class="${hiddenTypes.has(t)?'off':''}" onclick="toggleType('${t}')"><i style="background:${TYPE_COLORS[t]||TYPE_COLORS.OTHER}"></i>${t}</span>`).join("");
}
function toggleType(t) { hiddenTypes.has(t) ? hiddenTypes.delete(t) : hiddenTypes.add(t); drawLegend(); if (!raf) draw(); }
function onSearch() { match = $("search").value.trim().toLowerCase(); if (!raf) draw(); }
function visible(n) { return !hiddenTypes.has(n.type); }

function simStep() {
  const W = cv.clientWidth, H = cv.clientHeight, ns = G.nodes;
  for (let i=0;i<ns.length;i++) for (let j=i+1;j<ns.length;j++){ const a=ns[i],b=ns[j]; let dx=a.x-b.x,dy=a.y-b.y; let d2=dx*dx+dy*dy||0.01; let f=Math.min(9000/d2,5); const d=Math.sqrt(d2),ux=dx/d,uy=dy/d; a.vx+=ux*f;a.vy+=uy*f;b.vx-=ux*f;b.vy-=uy*f; }
  for (const e of G.edges){ let dx=e.t.x-e.s.x,dy=e.t.y-e.s.y; const d=Math.sqrt(dx*dx+dy*dy)||0.01; const f=(d-130)*0.011,ux=dx/d,uy=dy/d; e.s.vx+=ux*f;e.s.vy+=uy*f;e.t.vx-=ux*f;e.t.vy-=uy*f; }
  for (const n of ns){ if (n===drag){ n.vx=n.vy=0; continue; } n.vx+=(W/2-n.x)*0.001; n.vy+=(H/2-n.y)*0.001; n.vx*=0.85;n.vy*=0.85;n.x+=n.vx;n.y+=n.vy; }
  for (let p=0;p<2;p++) for (let i=0;i<ns.length;i++) for (let j=i+1;j<ns.length;j++){ const a=ns[i],b=ns[j]; let dx=b.x-a.x,dy=b.y-a.y; let d=Math.sqrt(dx*dx+dy*dy)||0.01; const minD=nodeR(a)+nodeR(b)+24; if (d<minD){ const push=(minD-d)/2,ux=dx/d,uy=dy/d; if(a!==drag){a.x-=ux*push;a.y-=uy*push;} if(b!==drag){b.x+=ux*push;b.y+=uy*push;} } }
  for (const n of ns){ const r=nodeR(n); n.x=Math.max(r+6,Math.min(W-r-6,n.x)); n.y=Math.max(r+6,Math.min(H-r-6,n.y)); }
}
function draw() {
  const css = getComputedStyle(document.documentElement);
  const edge = css.getPropertyValue("--shadow-d").trim(), txt = css.getPropertyValue("--text").trim();
  ctx.clearRect(0,0,cv.clientWidth,cv.clientHeight);
  ctx.strokeStyle = edge; ctx.lineWidth = 1;
  for (const e of G.edges){ if (!visible(e.s)||!visible(e.t)) continue; ctx.beginPath(); ctx.moveTo(e.s.x,e.s.y); ctx.lineTo(e.t.x,e.t.y); ctx.stroke(); }
  const labelAll = G.nodes.filter(visible).length <= 28;
  for (const n of G.nodes){
    if (!visible(n)) continue;
    const r = nodeR(n);
    const hit = match && n.name.toLowerCase().includes(match);
    ctx.globalAlpha = (match && !hit) ? 0.25 : 1;
    if (hit) { ctx.beginPath(); ctx.arc(n.x,n.y,r+4,0,Math.PI*2); ctx.strokeStyle = css.getPropertyValue("--accent").trim(); ctx.lineWidth = 2; ctx.stroke(); }
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2); ctx.fillStyle = TYPE_COLORS[n.type]||TYPE_COLORS.OTHER; ctx.fill();
    if (labelAll || hit || n.degree >= 2 || n === hover || n === drag) {
      const focus = (n === hover || n === drag || hit);
      ctx.fillStyle = txt; ctx.font = (focus ? "600 " : "") + "11px system-ui"; ctx.fillText(n.name, n.x+r+4, n.y+4);
    }
    ctx.globalAlpha = 1;
  }
}
function tick(f){ simStep(); draw(); if (f>0 || drag) raf = requestAnimationFrame(()=>tick(f-1)); }
function nodeAt(mx,my){ for (const n of G.nodes){ if (!visible(n)) continue; const r=nodeR(n)+5; if ((n.x-mx)**2+(n.y-my)**2<=r*r) return n; } return null; }
cv.addEventListener("mousedown", ev => { const b=cv.getBoundingClientRect(); drag=nodeAt(ev.clientX-b.left,ev.clientY-b.top); if (drag){ cv.style.cursor="grabbing"; if(!raf) tick(0); } });
cv.addEventListener("mousemove", ev => { const b=cv.getBoundingClientRect(); const h=nodeAt(ev.clientX-b.left,ev.clientY-b.top); if (h!==hover){ hover=h; cv.style.cursor=h?"pointer":"grab"; if(!raf) draw(); } });
cv.addEventListener("mouseleave", () => { if (hover){ hover=null; if(!raf) draw(); } });
window.addEventListener("mousemove", ev => { if (!drag) return; const b=cv.getBoundingClientRect(); drag.x=ev.clientX-b.left; drag.y=ev.clientY-b.top; });
window.addEventListener("mouseup", () => { if (drag){ drag=null; cv.style.cursor="grab"; tick(90); } });
window.addEventListener("resize", () => { size(); draw(); });

$("themeBtn").onclick = () => {
  const dark = document.documentElement.getAttribute("data-theme") === "dark";
  document.documentElement.setAttribute("data-theme", dark ? "light" : "dark");
  $("themeBtn").textContent = dark ? "🌙" : "☀️"; draw();
};

load();
</script>
</body>
</html>
